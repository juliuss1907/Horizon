name: Horizon Daily News Digest

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - crypto
          - tech
          - f1
          - evening

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Detect batch
        id: detect_batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            HOUR_UTC=$(date -u +"%H")
            HOUR_UTC=$((10#$HOUR_UTC))  # bỏ leading zero, ép thành số
            
            if [ $HOUR_UTC -ge 22 ] || [ $HOUR_UTC -le 23 ]; then
              echo "batch=morning" >> $GITHUB_OUTPUT
            elif [ $HOUR_UTC -ge 0 ] && [ $HOUR_UTC -le 1 ]; then
              echo "batch=crypto" >> $GITHUB_OUTPUT
            elif [ $HOUR_UTC -ge 4 ] && [ $HOUR_UTC -le 5 ]; then
              echo "batch=tech" >> $GITHUB_OUTPUT
            elif [ $HOUR_UTC -ge 8 ] && [ $HOUR_UTC -le 9 ]; then
              echo "batch=f1" >> $GITHUB_OUTPUT
            elif [ $HOUR_UTC -ge 12 ] && [ $HOUR_UTC -le 13 ]; then
              echo "batch=evening" >> $GITHUB_OUTPUT
            else
              echo "No matching batch for UTC hour $HOUR_UTC, skipping."
              echo "batch=skip" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set config for batch
        if: steps.detect_batch.outputs.batch != 'skip'
        run: cp data/configs/config-${{ steps.detect_batch.outputs.batch }}.json data/config.json

      - name: Run Horizon
        if: steps.detect_batch.outputs.batch != 'skip'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: uv run horizon --hours 8

      - name: Rename output with batch name
        if: steps.detect_batch.outputs.batch != 'skip'
        run: |
          TODAY=$(TZ='Asia/Ho_Chi_Minh' date +%Y-%m-%d)
          BATCH=${{ steps.detect_batch.outputs.batch }}

          for f in data/summaries/horizon-*-*.md; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f")
              LANG=${BASENAME##horizon-????-??-??-}
              LANG=${LANG%.md}
              NEW="horizon-${TODAY}-${BATCH}-${LANG}.md"
              mv "$f" "data/summaries/${NEW}"
              echo "Renamed: ${BASENAME} -> ${NEW}"
            fi
          done

          echo "Files in data/summaries/:"
          ls -la data/summaries/

      - name: Deploy to GitHub Pages
        if: steps.detect_batch.outputs.batch != 'skip'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/summaries
          keep_files: true
