name: Horizon Daily News Digest

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - crypto
          - tech
          - f1
          - evening

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Detect batch
        id: detect_batch
        run: |
          HOUR=$(TZ='Asia/Ho_Chi_Minh' date +"%H%M")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge "0445" ] && [ "$HOUR" -le "0530" ]; then
            echo "batch=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge "0645" ] && [ "$HOUR" -le "0730" ]; then
            echo "batch=crypto" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge "1045" ] && [ "$HOUR" -le "1130" ]; then
            echo "batch=tech" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge "1445" ] && [ "$HOUR" -le "1530" ]; then
            echo "batch=f1" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge "1845" ] && [ "$HOUR" -le "1930" ]; then
            echo "batch=evening" >> $GITHUB_OUTPUT
          else
            echo "batch=morning" >> $GITHUB_OUTPUT
          fi

      - name: Set config for batch
        run: cp data/configs/config-${{ steps.detect_batch.outputs.batch }}.json data/config.json

      - name: Run Horizon
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: uv run horizon --hours 8

      - name: Rename output with batch name
        run: |
          TODAY=$(TZ='Asia/Ho_Chi_Minh' date +%Y-%m-%d)
          BATCH=${{ steps.detect_batch.outputs.batch }}
          PREFIX="horizon-${TODAY}-"

          for f in data/summaries/horizon-*-*.md; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f")
              # Bỏ prefix "horizon-YYYY-MM-DD-" để lấy lang
              LANG=${BASENAME##horizon-????-??-??-}
              LANG=${LANG%.md}
              NEW="horizon-${TODAY}-${BATCH}-${LANG}.md"
              mv "$f" "data/summaries/${NEW}"
              echo "Renamed: ${BASENAME} -> ${NEW}"
            fi
          done

          echo "Files in data/summaries/:"
          ls -la data/summaries/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/summaries
          keep_files: true
